<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060b09">
<title>Freecash – Claim Your Reward</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060b09;
  --bg2:#0c1712;
  --mint:#34d399;
  --emerald:#10b981;
  --emerald-deep:#059669;
  --text:#eafff5;
  --muted:#7f9a8e;
  --line:rgba(52,211,153,0.14);
}
html{background:var(--bg);-webkit-text-size-adjust:100%}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  background:radial-gradient(125% 90% at 50% -8%, var(--bg2) 0%, var(--bg) 56%);
  color:var(--text);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top) + 42px) 24px calc(env(safe-area-inset-bottom) + 26px);
  overflow:hidden;position:relative;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(62% 38% at 50% 6%, rgba(16,185,129,0.13), transparent 70%);
}

/* TOP — brand */
.brand{
  position:relative;z-index:2;display:inline-flex;align-items:center;gap:9px;
  font-family:"Sora",sans-serif;font-weight:700;font-size:14px;letter-spacing:.07em;color:var(--text);
  animation:fade .6s ease both .1s;
}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--mint);box-shadow:0 0 12px var(--mint);animation:blink 1.6s ease-in-out infinite}

/* MIDDLE — coin + headline */
.mid{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center}
.coin{
  width:94px;height:94px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--mint),var(--emerald-deep));
  box-shadow:0 0 0 8px rgba(16,185,129,0.08),0 18px 50px rgba(16,185,129,0.34);
  margin-bottom:26px;animation:pop .7s cubic-bezier(.16,1,.3,1) both .15s;
}
.coin svg{width:44px;height:44px;color:#04150e}
.pill{
  display:inline-block;font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--mint);
  border:1px solid var(--line);border-radius:100px;padding:6px 14px;margin-bottom:18px;background:rgba(16,185,129,0.06);
  animation:fade .6s ease both .25s;
}
h1{
  font-family:"Sora",sans-serif;font-weight:800;font-size:clamp(28px,8.6vw,38px);line-height:1.08;letter-spacing:-.02em;
  animation:rise .6s cubic-bezier(.16,1,.3,1) both .3s;
}
h1 .amt{color:transparent;background:linear-gradient(135deg,var(--mint),var(--emerald));-webkit-background-clip:text;background-clip:text}
.sub{margin-top:14px;font-size:14.5px;line-height:1.55;color:var(--muted);max-width:300px;animation:rise .6s ease both .4s}

/* BOTTOM — button */
.cta-wrap{position:relative;z-index:2;width:100%;max-width:380px;animation:rise .6s ease both .5s}
.cta{
  width:100%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:"Sora",sans-serif;font-weight:700;font-size:16px;letter-spacing:.01em;color:#04150e;
  background:linear-gradient(135deg,var(--mint) 0%,var(--emerald) 100%);
  border-radius:16px;padding:19px 24px;box-shadow:0 14px 34px rgba(16,185,129,0.34);
  position:relative;overflow:hidden;animation:breathe 2.4s ease-in-out infinite;
  user-select:none;-webkit-user-select:none;
}
.cta:active{transform:scale(.975);animation-play-state:paused}
.cta .arr{animation:nudge 1.3s ease-in-out infinite}
.cta::after{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:sweep 3.2s ease-in-out infinite 1.5s}
.foot{margin-top:14px;text-align:center;font-size:12px;color:var(--muted);animation:fade .6s ease both .6s}
.foot b{color:var(--text);font-weight:600}

@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes breathe{0%,100%{box-shadow:0 14px 34px rgba(16,185,129,.30)}50%{box-shadow:0 18px 46px rgba(16,185,129,.5)}}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
@keyframes sweep{0%{left:-120%}60%,100%{left:160%}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>

  <div class="brand"><span class="dot"></span>FREECASH</div>

  <div class="mid">
    <div class="coin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1.5v21M16.5 5H9.75a3.25 3.25 0 0 0 0 6.5h4.5a3.25 3.25 0 0 1 0 6.5H7"/></svg>
    </div>
    <span class="pill">Reward unlocked</span>
    <h1>Your reward is<br><span class="amt">ready to claim</span></h1>
    <p class="sub">Tap below to continue in your browser and finish — it only takes a second.</p>
  </div>

  <div class="cta-wrap">
    <button id="ctaBtn" class="cta">Claim my reward <span class="arr">&rarr;</span></button>
    <div class="foot"><b>Always free to join</b> &middot; secure</div>
  </div>

<script>
// === CLAIM BUTTON — opens in the real browser, passes all URL params ===
(function(){
  var DEST = 'https://www.trustonedeal.com/';

  function buildUrl(){
    var p = new URLSearchParams(window.location.search);
    return p.toString() ? DEST + '?' + p.toString() : DEST;
  }

  document.getElementById('ctaBtn').addEventListener('click', function(){
    var w = window.open(buildUrl(), '_blank', 'noopener,noreferrer');
    if(!w || w.closed || typeof w.closed === 'undefined'){
      window.location.href = buildUrl();
    }
  });
})();
</script>

<!-- TikTok In-App Browser Breakout -->
<script>
(function(){
  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isTikTok = /tiktok|musical_ly|bytedance/i.test(ua);
  if(!isTikTok) return;
  try{ if(sessionStorage.getItem('ttBreakout')==='1') return; sessionStorage.setItem('ttBreakout','1'); }catch(e){}
  var url = window.location.href;
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);
  if(isIOS){ window.location.href='x-safari-'+url; setTimeout(function(){window.location.href=url;},25); }
  else if(isAndroid){ window.location.href='intent://'+url.replace(/https?:\/\//,'')+'#Intent;scheme=https;action=android.intent.action.VIEW;end'; setTimeout(function(){window.location.href=url;},25); }
})();
</script>
</body>
</html>
