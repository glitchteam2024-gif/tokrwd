<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f1f1f4">
<title>$750 Apple Cash</title>
<style>
  /* ===================================================================
     >>> EDIT ME <<<  Paste your sweepstakes / offer link below.
     When the visitor taps "Get Started" they are redirected here.
     =================================================================== */
  :root { --offer-url: "https://YOUR-OFFER-LINK-HERE.com"; }
 
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
 
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f1f1f4;
    color: #111;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
 
  .page {
    width: 100%;
    max-width: 430px;                /* iPhone Pro Max width */
    padding: max(44px, env(safe-area-inset-top)) 22px calc(36px + env(safe-area-inset-bottom));
  }
 
  h1 {
    text-align: center;
    font-size: clamp(34px, 10.5vw, 42px);
    font-weight: 600;                /* thinner */
    letter-spacing: -1.4px;
    line-height: 1.05;
  }
 
  .subtitle {
    text-align: center;
    color: #6e6e73;
    font-size: clamp(15px, 4.6vw, 18px);
    font-weight: 400;                /* thinner */
    margin-top: 12px;
  }
 
  /* ---- Cash card (image already contains "Cash" + "$750") ---- */
  .card {
    margin-top: 26px;
    border-radius: 24px;
    overflow: hidden;
    background: #0a0a0a;
    box-shadow: 0 16px 36px rgba(0,0,0,0.26);
    line-height: 0;
  }
  .card img {
    width: 100%;
    height: auto;
    display: block;
    image-rendering: -webkit-optimize-contrast;
  }
 
  /* ---- How it works ---- */
  h2 {
    font-size: clamp(24px, 7.4vw, 28px);
    font-weight: 600;                /* thinner */
    letter-spacing: -0.8px;
    margin: 32px 0 16px;
  }
 
  .step {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #e8e8ec;
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .step .icon {
    flex-shrink: 0;
    width: 52px; height: 52px;
    background: #dadade;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .step .icon svg { width: 24px; height: 24px; stroke: #2a2a2e; }
  .step .text { flex: 1; min-width: 0; }
  .step .text .t { font-size: clamp(18px, 5.2vw, 20px); font-weight: 600; letter-spacing: -0.3px; }
  .step .text .d { font-size: clamp(14px, 4vw, 15px); color: #6e6e73; margin-top: 2px; font-weight: 400; }
  .step .num {
    flex-shrink: 0;
    width: 32px; height: 32px;
    background: #0a0a0a; color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600;
  }
 
  /* ---- CTA ---- */
  .cta {
    display: flex; align-items: center; justify-content: center; gap: 9px;
    width: 100%;
    margin-top: 22px;
    background: #0a0a0a; color: #fff;
    border: none;
    border-radius: 16px;
    padding: 21px;
    font-family: inherit;
    font-size: clamp(18px, 5.2vw, 20px);
    font-weight: 600;                /* thinner */
    letter-spacing: -0.2px;
    cursor: pointer;
    transition: transform .12s ease, opacity .12s ease;
  }
  .cta:active { transform: scale(.985); opacity: .9; }
</style>
</head>
<body>
  <div class="page">
    <h1>$750 Apple Cash</h1>
    <p class="subtitle">Complete simple tasks &amp; get rewarded instantly</p>
 
    <div class="card">
      <!-- ===== CARD IMAGE =====  Put your image file in the same GitHub folder
           as this HTML, then set the file name below (e.g. applepay.png). -->
      <img src="applepay.png" alt="$750 Cash" width="2100" height="1181">
    </div>
 
    <h2>How It Works:</h2>
 
    <div class="step">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7L22 6"/></svg>
      </div>
      <div class="text"><div class="t">Enter your email address</div><div class="d">For notifications and rewards</div></div>
      <div class="num">1</div>
    </div>
 
    <div class="step">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>
      </div>
      <div class="text"><div class="t">Complete 2&ndash;3 simple offers</div><div class="d">The more you do, the more you earn</div></div>
      <div class="num">2</div>
    </div>
 
    <div class="step">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      </div>
      <div class="text"><div class="t">Receive your Apple Pay reward</div><div class="d">Sent directly to your account</div></div>
      <div class="num">3</div>
    </div>
 
    <button class="cta" id="getStarted">Get Started <span>&rarr;</span></button>
  </div>
 
<script>
  var OFFER_URL = getComputedStyle(document.documentElement)
                    .getPropertyValue('--offer-url').trim().replace(/^"|"$/g, '');
  document.getElementById('getStarted').addEventListener('click', function () {
    window.location.href = OFFER_URL;
  });
</script>
</body>
</html>
